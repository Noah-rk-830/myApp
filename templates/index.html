<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>myGame</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    width:100vw;
    height:100vh;

    background:#444;
    color:white;

    font-family:"Yu Gothic","Meiryo",sans-serif;

    overflow:hidden;

}

/*=========================
    タイトル・メニュー全体
=========================*/

.main{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    gap:120px;

}

/*=========================
    タイトル
=========================*/

.title{

    font-size:56px;
    font-weight:normal;

}

/*=========================
    メニュー枠
=========================*/

.menu{

    border:3px solid #ddd;
    border-radius:8px;

    padding:12px;

}

/*=========================
    リスト
=========================*/

.menu ul{

    list-style:none;

}

.menu li{

    width:120px;

    padding:8px 6px;

    margin:4px 0;

    font-size:20px;

    border:1px solid transparent;

    user-select:none;

}

/* 選択中 */

.menu li.selected{

    border:1px solid white;

}

/*=========================
    バージョン
=========================*/

.version{

    position:fixed;

    left:20px;
    bottom:20px;

    font-size:18px;

}

</style>

</head>

<body>

<div class="main">

    <div class="title">
        myGame
    </div>

    <div class="menu">

        <ul id="menuList">

            <li class="selected" data-action="new">
                ニューゲーム
            </li>

            <li data-action="load">
                ロード
            </li>

            <li data-action="option">
                オプション
            </li>

        </ul>

    </div>

</div>

<div class="version">
    Ver. 1.0.3.0
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="{{ url_for('static', filename='js/title.js') }}"></script>

</body>
</html>
